name: Auto Update Playlist
on:
  schedule:
    - cron: '0 0 * * *' # هذا يعني أن السكربت سيعمل كل يوم في منتصف الليل (00:00)
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run fetcher script
        run: python fetcher.py
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add playlist.m3u
          git commit -m "Update playlist automatically"
          git push
